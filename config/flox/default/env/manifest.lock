    "hook": {
      "on-activate": "  # Set up env vars for bundler/rubygems\n  RUBY_LIB_VERSION=4.0.0\n\n  export BUNDLE_PATH=\"$FLOX_ENV_CACHE/bundler\"\n  export BUNDLE_BIN=\"$FLOX_ENV_CACHE/bundler/bin\"\n\n  export GEM_HOME=\"$FLOX_ENV_CACHE/bundler/ruby/$RUBY_LIB_VERSION\"\n  export GEM_PATH=\"$GEM_HOME/gems:${GEM_PATH:-}\"\n\n  export BOOTSNAP_CACHE_DIR=\"$FLOX_ENV_CACHE/bootsnap\"\n\n  # Set up env vars for bundler/rubygems\n  RUBY_LIB_VERSION=4.0.0\n\n  export GEM_HOME=\"$FLOX_ENV_CACHE/gem/ruby/$RUBY_LIB_VERSION\"\n  export GEM_PATH=\"$GEM_HOME/gems:${GEM_PATH:-}\"\n"
    },
    "profile": {
      "common": "  export PATH=\"$FLOX_ENV_PROJECT/bin:$BUNDLE_BIN:$GEM_HOME/bin:$PATH\"\n\n  bundle() {\n    # We only want to trigger for:\n    #   1) `bundle`                (no args)\n    #   2) `bundle install ...`    (install is first arg; flags allowed after)\n    #\n    # And only if the underlying bundle command succeeds.\n\n    local run_binstubs=0\n\n    if (( $# == 0 )); then\n      run_binstubs=1\n    elif [[ \"$1\" == \"install\" ]]; then\n      run_binstubs=1\n    fi\n\n    # Run the real bundler (avoid recursion)\n    command bundle \"$@\"\n    local rc=$?\n\n    # Only run binstubs when we matched AND bundle succeeded\n    if (( rc == 0 && run_binstubs == 1 )); then\n      command bundle binstubs --all\n      # If you prefer to propagate binstubs failure, uncomment:\n      # return $?\n    fi\n\n    return $rc\n  }\n\n  typeset -U path PATH\n  path+=(\"$GEM_HOME/bin\")\n"
    },
    "options": {
      "systems": [
        "aarch64-darwin",
        "aarch64-linux",
        "x86_64-darwin",
        "x86_64-linux"
      ],
      "activate": {
        "mode": "run"
      }
    }
  },
